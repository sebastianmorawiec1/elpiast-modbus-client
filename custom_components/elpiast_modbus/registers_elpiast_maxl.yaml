# Mapa rejestrow Modbus dla sterownika EL-PIAST ELP11R32L (MAX L+ v6.4)
# Zrodlo: DTR 183-03-2021 (rozdz. 8 'Zmienne Modbus RTU').
# Zmienne 32-bit; uzyto 16-bitowych przestrzeni adresowych sterownika:
#  - Fixed  -> adres 0x7000 + (adr_tabeli/2), wartosc x100 -> scale 0.01
#  - MSV    -> adres 0x4000 + (adr_tabeli/2), scale 1
# Modbus TCP wymaga modulu ELP11R32L-MOD-IP+ (karta Ethernet).

UnitState:
  address: 16384
  table: holding
  data_type: int16
  scale: 1.0
  unit: ""
